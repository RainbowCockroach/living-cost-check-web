<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Living Cost Check</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — decode the ?/path redirect
      // produced by 404.html back into a real URL before the router boots.
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
    <!-- Standard Desktop Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/tien_32.png"
    />

    <!-- Apple Touch Icon (iOS) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/tien_180.png"
    />

    <!-- Android Chrome Icon -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/tien_192.png"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
